<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link de acesso — Hera DG</title>
  <!-- Colar no Supabase → Authentication → Email Templates → Magic link (se usar) -->
</head>
<body style="margin:0;padding:0;background-color:#0b1220;font-family:Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#0b1220;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:520px;background:#111a2c;border-radius:18px;border:1px solid rgba(56,189,248,0.2);">
          <tr>
            <td style="padding:32px;text-align:left;">
              <p style="margin:0 0 6px 0;font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#38bdf8;">HeraFlow</p>
              <h1 style="margin:0;font-size:22px;font-weight:800;color:#f8fafc;">O seu link de acesso</h1>
              <p style="margin:14px 0 0 0;font-size:14px;line-height:1.65;color:#94a3b8;">
                Clique no botão para iniciar sessão sem palavra-passe. Este link é de utilização única e expira em breve.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:0 32px 32px 32px;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 26px;border-radius:12px;font-weight:700;text-decoration:none;color:#020617;background:linear-gradient(180deg,#7dd3fc,#0ea5e9);">
                Entrar no HeraFlow
              </a>
              <p style="margin:18px 0 0 0;font-size:11px;color:#64748b;word-break:break-all;">{{ .ConfirmationURL }}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
